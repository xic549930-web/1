body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Hiragino Sans GB",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;min-height:100dvh;overflow-x:hidden}
.page{display:none;min-height:100vh;min-height:100dvh;padding:16px 16px calc(var(--tab-h)+12px+var(--safe-b));max-width:430px;margin:0 auto}

h1{font-size:22px;font-weight:700;text-align:center;padding:20px 0 4px;color:var(--pri)}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{text-align:center;padding:10px 4px;border-radius:12px;cursor:pointer;transition:.15s}
.stat:active{transform:scale(.96)}
.stat.g{background:var(--green-l)}.stat.g .n{color:var(--green)}
.stat.a{background:var(--amber-l)}.stat.a .n{color:var(--amber)}
.stat.d{background:var(--gray-l)}.stat.d .n{color:var(--gray)}
.stat .n{font-size:20px;font-weight:700;line-height:1.2}

.section-title{font-size:13px;color:var(--gray);margin:0 4px 8px;font-weight:500}

.letter-btn.special.err{color:var(--amber);border-color:#fbbf24}
.letter-btn.special.err.active{background:var(--amber);color:#fff;border-color:var(--amber)}
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;transition:.12s;text-align:center}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--pri);color:#fff}
.btn-outline{background:var(--card);color:var(--txt);border:1.5px solid #e2e8f0}
.btn+.btn{margin-top:10px}
.study-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.back-btn{font-size:14px;color:var(--gray);background:none;border:none;padding:8px;cursor:pointer}
.counter{font-size:14px;color:var(--txt2);font-weight:500}
.thin-bar{width:100%;height:3px;background:var(--gray-l);border-radius:2px;margin-bottom:20px;overflow:hidden}
.thin-bar-fill{height:100%;background:var(--pri);border-radius:2px;transition:width .3s}

.card-tag.ok{background:var(--green-l);color:var(--green)}
.star-btn{position:absolute;top:12px;left:14px;font-size:22px;background:none;border:none;cursor:pointer;padding:4px;line-height:1;filter:grayscale(1) opacity(.3);transition:.15s}

.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.action-btn.no{color:var(--amber);border-color:#fde68a;background:var(--amber-l)}
.action-btn.yes{color:var(--green);border-color:#a7f3d0;background:var(--green-l)}
.nav-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.nav-btn:active{transform:scale(.96)}
.nav-btn:disabled{opacity:.3}
.session-stats{display:flex;justify-content:center;gap:20px;margin-top:12px;font-size:13px;color:var(--gray)}
.done-page{align-items:center;justify-content:center;text-align:center}
.done-stats{display:flex;gap:16px;margin-bottom:28px}
.done-stat{padding:16px 28px;border-radius:16px;text-align:center}
.done-stat.g{background:var(--green-l)}.done-stat.g .n{color:var(--green)}
.done-stat.a{background:var(--amber-l)}.done-stat.a .n{color:var(--amber)}
.done-stat .n{font-size:28px;font-weight:700;line-height:1.2}
.done-stat .l{font-size:12px;color:var(--txt2);margin-top:2px}

.flex-g{flex-grow:1}
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h)+var(--safe-b));padding-bottom:var(--safe-b);background:var(--card);border-top:1px solid #e2e8f0;display:flex;z-index:100}
.tab-bar.hidden{display:none}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--gray);transition:.15s;border:none;background:none;font-size:10px;font-weight:500;padding:6px 0}
.tab.active{color:var(--pri)}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.list-tabs{display:flex;gap:0;background:var(--card);border-radius:12px;padding:3px;margin-bottom:12px;border:1px solid #e2e8f0}
.list-tab{flex:1;padding:8px 2px;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;background:transparent;color:var(--txt2);transition:.15s}
.list-tab.active{background:var(--pri);color:#fff}
.search-box{display:flex;align-items:center;background:var(--card);border:1.5px solid #e2e8f0;border-radius:12px;padding:0 12px;margin-bottom:12px}
.search-box:focus-within{border-color:var(--pri)}
.search-box input{flex:1;border:none;outline:none;padding:10px 8px;font-size:14px;background:transparent;color:var(--txt)}
.list-action-bar{display:flex;gap:8px;margin-bottom:12px}
.list-action-btn{flex:1;padding:10px;border:1.5px solid #e2e8f0;border-radius:12px;background:var(--card);font-size:13px;font-weight:600;color:var(--txt2);cursor:pointer;text-align:center}
.list-action-btn:active{transform:scale(.96)}
.list-action-btn.pri{background:var(--pri);color:#fff;border-color:var(--pri)}
.word-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.word-item{display:flex;align-items:center;padding:11px 12px;background:var(--card);border-radius:12px;margin-bottom:5px;box-shadow:0 1px 2px rgba(0,0,0,.04);gap:8px;cursor:pointer;transition:.12s}
.word-item:active{background:#f8fafc}
.wi-star{font-size:16px;flex-shrink:0;cursor:pointer;padding:2px;filter:grayscale(1) opacity(.25);transition:.12s}
.wi-star.active{filter:none}
.wi-word{font-size:15px;font-weight:600;color:var(--txt);flex:1;min-width:0}
.wi-meaning{font-size:13px;color:var(--pri);margin-top:3px;display:none;animation:fadeUp .2s}
.wi-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;flex-shrink:0}
.wi-tag.g{background:var(--green-l);color:var(--green)}
.wi-tag.a{background:var(--amber-l);color:var(--amber)}

let filter='ALL',known={},unknown={},starred={},session=[],idx=0,shown=false,sK=0,sU=0,curLT='all';
const LS=localStorage;
function load(){try{known=JSON.parse(LS.getItem('vk')||'{}');unknown=JSON.parse(LS.getItem('vu')||'{}');starred=JSON.parse(LS.getItem('vs')||'{}')}catch{}}
function save(){try{LS.setItem('vk',JSON.stringify(known));LS.setItem('vu',JSON.stringify(unknown));LS.setItem('vs',JSON.stringify(starred))}catch{}}
function gm(w){return D[w]||D[w.toLowerCase()]||'（释义待补充）'}

function showPage(p){document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));document.getElementById(p+'Page').classList.add('active');document.getElementById('tabBar').classList.toggle('hidden',p==='study'||p==='done');if(p==='menu')refreshMenu();if(p==='list'){renderListTabs();renderList()}}
function switchTab(t){document.querySelectorAll('.tab').forEach((e,i)=>e.classList.toggle('active',i===(t==='menu'?0:1)));showPage(t)}

function refreshMenu(){
const total=W.length,kn=Object.keys(known).length,uk=Object.keys(unknown).length;
document.getElementById('totalCount').textContent=total;
document.getElementById('progressText').textContent=kn+'/'+total;
document.getElementById('progressBar').style.width=Math.round(kn/total*100)+'%';
document.getElementById('knownCount').textContent=kn;
document.getElementById('unknownCount').textContent=uk;
document.getElementById('newCount').textContent=total-kn-uk;
document.getElementById('resetBtn').style.display=(kn||uk)?'block':'none';
const grid=document.getElementById('letterGrid');grid.innerHTML='';
const mk=(t,c,v)=>{const b=document.createElement('button');b.className='letter-btn '+c+(filter===v?' active':'');b.innerHTML=t;b.onclick=()=>{filter=v;refreshMenu()};return b};
grid.appendChild(mk('全部','special','ALL'));
if(uk)grid.appendChild(mk('错题('+uk+')','special err','UNKNOWN'));
[...new Set(W.map(w=>w[0].toUpperCase()))].sort().forEach(l=>{grid.appendChild(mk(l+'<span class="cnt">'+W.filter(w=>w[0].toUpperCase()===l).length+'</span>','',l))});
document.getElementById('btnSeq').textContent='顺序背诵 ('+getFiltered().length+'词)';
}
function getFiltered(){if(filter==='ALL')return W;if(filter==='UNKNOWN')return W.filter(w=>unknown[w]);return W.filter(w=>w[0].toUpperCase()===filter)}

function startStudy(mode){let list=[...getFiltered()];if(!list.length)return;if(mode==='rand'){for(let i=list.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[list[i],list[j]]=[list[j],list[i]]}}session=list;idx=0;shown=false;sK=0;sU=0;document.getElementById('modeLabel').textContent=mode==='rand'?'随机':'顺序';showPage('study');renderCard()}
function studyListWords(){const words=getListWords();if(!words.length)return;session=[...words];for(let i=session.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[session[i],session[j]]=[session[j],session[i]]}idx=0;shown=false;sK=0;sU=0;document.getElementById('modeLabel').textContent='随机';showPage('study');renderCard()}

function renderCard(){
if(idx>=session.length){document.getElementById('doneKnown').textContent=sK;document.getElementById('doneUnknown').textContent=sU;showPage('done');return}
const w=session[idx];
document.getElementById('studyCounter').textContent=(idx+1)+' / '+session.length;
document.getElementById('studyBar').style.width=((idx+1)/session.length*100)+'%';
document.getElementById('wordText').textContent=w;
document.getElementById('cardTagErr').style.display=unknown[w]?'':'none';
document.getElementById('cardTagOk').style.display=known[w]?'':'none';
document.getElementById('starBtn').classList.toggle('active',!!starred[w]);
document.getElementById('sKnown').textContent=sK;document.getElementById('sUnknown').textContent=sU;
shown=false;
document.getElementById('meaningArea').innerHTML='<p class="hint">点击卡片查看中文释义</p>';
document.getElementById('actionArea').innerHTML='<div class="nav-row"><button class="nav-btn" onclick="prev()" '+(idx===0?'disabled':'')+'>上一个</button><button class="nav-btn" onclick="skip()">跳过</button></div>';
}
function flipCard(){if(shown)return;shown=true;document.getElementById('meaningArea').innerHTML='<p class="meaning">'+gm(session[idx])+'</p>';document.getElementById('actionArea').innerHTML='<div class="action-row"><button class="action-btn no" onclick="mark(false)">不认识</button><button class="action-btn yes" onclick="mark(true)">认识</button></div>'}
function mark(ok){const w=session[idx];if(ok){known[w]=true;delete unknown[w];sK++}else{unknown[w]=(unknown[w]||0)+1;delete known[w];sU++}save();idx++;shown=false;renderCard()}
function prev(){if(idx>0){idx--;shown=false;renderCard()}}
function skip(){idx++;shown=false;renderCard()}
function toggleStar(){const w=session[idx];if(starred[w])delete starred[w];else starred[w]=true;save();document.getElementById('starBtn').classList.toggle('active',!!starred[w])}
function resetAll(){if(confirm('确定要重置全部进度吗？')){known={};unknown={};starred={};save();refreshMenu()}}

// 词汇本
function renderListTabs(){
const sn=Object.keys(starred).length,un=Object.keys(unknown).length,kn=Object.keys(known).length,all=sn+un+kn;
const tabs=[['all','全部',all],['star','⭐收藏',sn],['unknown','待加强',un],['known','已掌握',kn]];
document.getElementById('listTabs').innerHTML=tabs.map(([id,label,n])=>'<button class="list-tab'+(curLT===id?' active':'')+'" onclick="setLT(\''+id+'\')">'+label+(n?'<span style="font-size:10px;opacity:.7;margin-left:2px">('+n+')</span>':'')+'</button>').join('');
}
function setLT(t){curLT=t;renderListTabs();renderList()}
function getListWords(){
const q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
let list;
if(curLT==='star')list=W.filter(w=>starred[w]);
else if(curLT==='unknown')list=W.filter(w=>unknown[w]);
else if(curLT==='known')list=W.filter(w=>known[w]);
else list=W.filter(w=>known[w]||unknown[w]||starred[w]);
if(q)list=list.filter(w=>w.toLowerCase().includes(q)||gm(w).includes(q));
return list;
}
function renderList(){
const list=getListWords();
document.getElementById('listActions').style.display=list.length?'flex':'none';
const c=document.getElementById('wordList');
if(!list.length){c.innerHTML='<div class="empty-state"><div class="es-icon">📚</div><div class="es-text">'+(curLT==='star'?'还没有收藏单词<br>背词时点 ⭐ 收藏重点词':'还没有记录<br>开始背词后这里会显示学习记录')+'</div></div>';return}
c.innerHTML=list.map(w=>{
const s=starred[w],k=known[w],u=unknown[w];
let tag=u?'<span class="wi-tag a">待加强'+(u>1?' ×'+u:'')+'</span>':(k?'<span class="wi-tag g">已掌握</span>':'');
return '<div class="word-item" onclick="toggleMeaning(this)"><span class="wi-star'+(s?' active':'')+'" onclick="event.stopPropagation();tls(\''+w.replace(/'/g,"\\'")+'\')">⭐</span><div style="flex:1;min-width:0"><div class="wi-word">'+w+'</div><div class="wi-meaning">'+gm(w)+'</div></div>'+tag+'</div>'
}).join('');
}
function toggleMeaning(el){const m=el.querySelector('.wi-meaning');m.style.display=m.style.display==='block'?'none':'block'}
function tls(w){if(starred[w])delete starred[w];else starred[w]=true;save();renderListTabs();renderList()}

let tx=null;
document.getElementById('flashcard').addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
document.getElementById('flashcard').addEventListener('touchend',e=>{if(!tx||!shown)return;const d=e.changedTouches[0].clientX-tx;tx=null;if(Math.abs(d)>60){d<0?mark(true):mark(false)}},{passive:true});

load();refreshMenu();
</script>
