<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="联考词汇">
<meta name="theme-color" content="#0c4a6e">
<title>联考英语词汇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f0f7ff;--card:#fff;--pri:#0369a1;--pri-l:#e0f2fe;--green:#059669;--green-l:#d1fae5;--amber:#d97706;--amber-l:#fef3c7;--red:#dc2626;--gray:#64748b;--gray-l:#f1f5f9;--txt:#0f172a;--txt2:#475569;--radius:16px;--safe-b:env(safe-area-inset-bottom,0px)}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Hiragino Sans GB",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;min-height:100dvh;overflow-x:hidden}
.page{display:none;min-height:100vh;min-height:100dvh;padding:16px;padding-bottom:calc(16px + var(--safe-b));max-width:430px;margin:0 auto}
.page.active{display:flex;flex-direction:column}
h1{font-size:22px;font-weight:700;text-align:center;padding:20px 0 4px;color:var(--pri)}
.subtitle{text-align:center;font-size:13px;color:var(--gray);margin-bottom:16px}
.progress-box{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.progress-bar-bg{width:100%;height:8px;background:var(--gray-l);border-radius:4px;overflow:hidden;margin:8px 0 12px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#0ea5e9,var(--pri));border-radius:4px;transition:width .4s}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{text-align:center;padding:10px 4px;border-radius:12px}
.stat.g{background:var(--green-l)}.stat.g .n{color:var(--green)}
.stat.a{background:var(--amber-l)}.stat.a .n{color:var(--amber)}
.stat.d{background:var(--gray-l)}.stat.d .n{color:var(--gray)}
.stat .n{font-size:20px;font-weight:700;line-height:1.2}
.stat .l{font-size:11px;color:var(--txt2);margin-top:2px}
.section-title{font-size:13px;color:var(--gray);margin:0 4px 8px;font-weight:500}
.letter-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.letter-btn{min-width:36px;height:34px;border:1.5px solid #e2e8f0;background:var(--card);border-radius:10px;font-size:13px;font-weight:600;color:var(--txt2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;position:relative}
.letter-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.letter-btn .cnt{font-size:9px;font-weight:400;opacity:.6;margin-left:1px}
.letter-btn.special{min-width:auto;padding:0 12px;font-weight:500}
.letter-btn.special.err{color:var(--amber);border-color:#fbbf24}
.letter-btn.special.err.active{background:var(--amber);color:#fff;border-color:var(--amber)}
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;transition:all .12s;text-align:center}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--pri);color:#fff}
.btn-outline{background:var(--card);color:var(--txt);border:1.5px solid #e2e8f0}
.btn+.btn{margin-top:10px}
.btn:disabled{opacity:.4}

.study-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.back-btn{font-size:14px;color:var(--gray);background:none;border:none;padding:8px;cursor:pointer}
.counter{font-size:14px;color:var(--txt2);font-weight:500}
.thin-bar{width:100%;height:3px;background:var(--gray-l);border-radius:2px;margin-bottom:20px;overflow:hidden}
.thin-bar-fill{height:100%;background:var(--pri);border-radius:2px;transition:width .3s}

.card{background:var(--card);border-radius:20px;padding:36px 24px;min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.06);cursor:pointer;user-select:none;position:relative;transition:transform .15s;margin-bottom:16px}
.card:active{transform:scale(.985)}
.card-tag{position:absolute;top:12px;right:14px;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.card-tag.err{background:var(--amber-l);color:var(--amber)}
.card-tag.ok{background:var(--green-l);color:var(--green)}
.word{font-size:30px;font-weight:700;color:var(--txt);text-align:center;margin-bottom:12px;letter-spacing:-.5px}
.meaning{font-size:18px;color:var(--pri);font-weight:600;text-align:center;line-height:1.5;animation:fadeUp .25s}
.hint{font-size:13px;color:#94a3b8;margin-top:8px}

.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.action-btn{padding:14px;border-radius:14px;font-size:15px;font-weight:600;border:2px solid;cursor:pointer;transition:all .12s;text-align:center;background:transparent}
.action-btn:active{transform:scale(.95)}
.action-btn.no{color:var(--amber);border-color:#fde68a;background:var(--amber-l)}
.action-btn.yes{color:var(--green);border-color:#a7f3d0;background:var(--green-l)}
.nav-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.nav-btn{padding:12px;border-radius:12px;font-size:14px;color:var(--gray);background:var(--card);border:1.5px solid #e2e8f0;cursor:pointer;text-align:center}
.nav-btn:active{transform:scale(.96)}
.nav-btn:disabled{opacity:.3}

.session-stats{display:flex;justify-content:center;gap:20px;margin-top:12px;font-size:13px;color:var(--gray)}

.done-page{align-items:center;justify-content:center;text-align:center}
.done-emoji{font-size:56px;margin-bottom:16px}
.done-title{font-size:22px;font-weight:700;margin-bottom:16px}
.done-stats{display:flex;gap:16px;margin-bottom:28px}
.done-stat{padding:16px 28px;border-radius:16px;text-align:center}
.done-stat.g{background:var(--green-l)}.done-stat.g .n{color:var(--green)}
.done-stat.a{background:var(--amber-l)}.done-stat.a .n{color:var(--amber)}
.done-stat .n{font-size:28px;font-weight:700;line-height:1.2}
.done-stat .l{font-size:12px;color:var(--txt2);margin-top:2px}

.reset-btn{background:none;border:none;font-size:12px;color:#94a3b8;padding:12px;cursor:pointer;margin-top:8px;text-align:center;width:100%}

.flex-g{flex-grow:1}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- 主页 -->
<div class="page active" id="menuPage">
  <h1>联考英语词汇</h1>
  <p class="subtitle">2026全国联招考纲 · <span id="totalCount">0</span> 词</p>

  <div class="progress-box">
    <div style="display:flex;justify-content:space-between;font-size:13px">
      <span style="color:var(--gray)">总进度</span>
      <span style="color:var(--pri);font-weight:600" id="progressText">0/0</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="stats">
      <div class="stat g"><div class="n" id="knownCount">0</div><div class="l">已掌握</div></div>
      <div class="stat a"><div class="n" id="unknownCount">0</div><div class="l">待加强</div></div>
      <div class="stat d"><div class="n" id="newCount">0</div><div class="l">未学习</div></div>
    </div>
  </div>

  <div class="section-title">选择范围</div>
  <div class="letter-grid" id="letterGrid"></div>

  <div class="flex-g"></div>

  <button class="btn btn-primary" id="btnSeq" onclick="startStudy('seq')">顺序背诵</button>
  <button class="btn btn-outline" onclick="startStudy('rand')">随机抽背</button>
  <button class="reset-btn" id="resetBtn" onclick="resetAll()">重置全部进度</button>
</div>

<!-- 学习页 -->
<div class="page" id="studyPage">
  <div class="study-header">
    <button class="back-btn" onclick="showPage('menu')">← 返回</button>
    <span class="counter" id="studyCounter">1 / 100</span>
    <span style="font-size:13px;color:var(--gray)" id="modeLabel">顺序</span>
  </div>
  <div class="thin-bar"><div class="thin-bar-fill" id="studyBar" style="width:0%"></div></div>

  <div class="card" id="flashcard" onclick="flipCard()">
    <span class="card-tag err" id="cardTagErr" style="display:none">易错</span>
    <span class="card-tag ok" id="cardTagOk" style="display:none">已掌握</span>
    <div class="word" id="wordText"></div>
    <div id="meaningArea"></div>
  </div>

  <div id="actionArea"></div>

  <div class="session-stats">
    <span>✓ <span id="sKnown">0</span></span>
    <span>✗ <span id="sUnknown">0</span></span>
  </div>
</div>

<!-- 完成页 -->
<div class="page done-page" id="donePage">
  <div class="done-emoji">🎉</div>
  <div class="done-title">本轮完成！</div>
  <div class="done-stats">
    <div class="done-stat g"><div class="n" id="doneKnown">0</div><div class="l">认识</div></div>
    <div class="done-stat a"><div class="n" id="doneUnknown">0</div><div class="l">不认识</div></div>
  </div>
  <button class="btn btn-primary" onclick="showPage('menu')" style="max-width:240px">返回主页</button>
</div>

// ===== 状态 =====
let filter='ALL',known={},unknown={},session=[],idx=0,shown=false,sK=0,sU=0;
const LS=window.localStorage||{};
function load(){try{known=JSON.parse(LS.getItem('vk')||'{}');unknown=JSON.parse(LS.getItem('vu')||'{}')}catch{}}
function save(){try{LS.setItem('vk',JSON.stringify(known));LS.setItem('vu',JSON.stringify(unknown))}catch{}}

function showPage(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.getElementById(p+'Page').classList.add('active');
  if(p==='menu')refreshMenu();
}

function refreshMenu(){
  const total=W.length,kn=Object.keys(known).length,uk=Object.keys(unknown).length;
  document.getElementById('totalCount').textContent=total;
  document.getElementById('progressText').textContent=kn+'/'+total;
  document.getElementById('progressBar').style.width=Math.round(kn/total*100)+'%';
  document.getElementById('knownCount').textContent=kn;
  document.getElementById('unknownCount').textContent=uk;
  document.getElementById('newCount').textContent=total-kn-uk;
  document.getElementById('resetBtn').style.display=(kn||uk)?'block':'none';

  // Letter grid
  const grid=document.getElementById('letterGrid');
  grid.innerHTML='';
  const mkBtn=(text,cls,val)=>{const b=document.createElement('button');b.className='letter-btn '+cls+(filter===val?' active':'');b.innerHTML=text;b.onclick=()=>{filter=val;refreshMenu()};return b};
  grid.appendChild(mkBtn('全部','special','ALL'));
  if(uk)grid.appendChild(mkBtn('错题('+uk+')','special err','UNKNOWN'));
  const letters=[...new Set(W.map(w=>w[0].toUpperCase()))].sort();
  letters.forEach(l=>{const c=W.filter(w=>w[0].toUpperCase()===l).length;grid.appendChild(mkBtn(l+'<span class="cnt">'+c+'</span>','',l))});

  const fc=getFiltered().length;
  document.getElementById('btnSeq').textContent='顺序背诵 ('+fc+'词)';
}

function getFiltered(){
  if(filter==='ALL')return W;
  if(filter==='UNKNOWN')return W.filter(w=>unknown[w]);
  return W.filter(w=>w[0].toUpperCase()===filter);
}

function startStudy(mode){
  let list=[...getFiltered()];
  if(mode==='rand'){for(let i=list.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[list[i],list[j]]=[list[j],list[i]]}}
  session=list;idx=0;shown=false;sK=0;sU=0;
  document.getElementById('modeLabel').textContent=mode==='rand'?'随机':'顺序';
  showPage('study');
  renderCard();
}

function renderCard(){
  if(idx>=session.length){
    document.getElementById('doneKnown').textContent=sK;
    document.getElementById('doneUnknown').textContent=sU;
    showPage('done');return;
  }
  const w=session[idx];
  document.getElementById('studyCounter').textContent=(idx+1)+' / '+session.length;
  document.getElementById('studyBar').style.width=((idx+1)/session.length*100)+'%';
  document.getElementById('wordText').textContent=w;
  document.getElementById('cardTagErr').style.display=unknown[w]?'':'none';
  document.getElementById('cardTagOk').style.display=known[w]?'':'none';
  document.getElementById('sKnown').textContent=sK;
  document.getElementById('sUnknown').textContent=sU;
  shown=false;
  document.getElementById('meaningArea').innerHTML='<p class="hint">点击卡片查看中文释义</p>';
  document.getElementById('actionArea').innerHTML='<div class="nav-row"><button class="nav-btn" onclick="prev()" '+(idx===0?'disabled':'')+'>上一个</button><button class="nav-btn" onclick="skip()">跳过</button></div>';
}

function flipCard(){
  if(shown)return;shown=true;
  const w=session[idx];
  const m=D[w]||D[w.toLowerCase()]||'（释义待补充）';
  document.getElementById('meaningArea').innerHTML='<p class="meaning">'+m+'</p>';
  document.getElementById('actionArea').innerHTML='<div class="action-row"><button class="action-btn no" onclick="mark(false)">不认识</button><button class="action-btn yes" onclick="mark(true)">认识</button></div>';
}

function mark(isKnown){
  const w=session[idx];
  if(isKnown){known[w]=true;delete unknown[w];sK++}
  else{unknown[w]=(unknown[w]||0)+1;delete known[w];sU++}
  save();idx++;shown=false;renderCard();
}
function prev(){if(idx>0){idx--;shown=false;renderCard()}}
function skip(){idx++;shown=false;renderCard()}
function resetAll(){if(confirm('确定要重置全部进度吗？')){known={};unknown={};save();refreshMenu()}}

// ===== 触摸滑动 =====
let tx=null;
document.getElementById('flashcard').addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
document.getElementById('flashcard').addEventListener('touchend',e=>{
  if(!tx||!shown)return;const d=e.changedTouches[0].clientX-tx;tx=null;
  if(Math.abs(d)>60){d<0?mark(true):mark(false)}
},{passive:true});

// ===== 初始化 =====
load();refreshMenu();
</script>
